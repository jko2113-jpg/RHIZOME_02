<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rhizomatic Website Network</title>

  <!-- Cytoscape -->
  <script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #cy {
      width: 100vw;
      height: 100vh;
      display: block;
      background: #ffffff;
    }

    #info {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      max-height: 30%;
      overflow-y: auto;
      background: rgba(255,255,255,0.95);
      border-top: 1px solid #ccc;
      padding: 15px;
      font-size: 14px;
    }

    a {
      color: blue;
    }
  </style>
</head>
<body>

<div id="cy"></div>
<div id="info">Loading network...</div>

<script>
fetch("network.json")
  .then(response => {
    console.log("Fetch response:", response);
    return response.json();
  })
  .then(data => {
    console.log("Loaded data:", data);

    // --- SAFETY CHECK ---
    if (!data || !Array.isArray(data)) {
      throw new Error("JSON is not an array");
    }

    // --- CREATE NODES ---
    const nodes = data.map(node => ({
      data: {
        id: node.url,
        label: node.title || node.url,
        url: node.url
      }
    }));

    // --- CREATE EDGES ---
    const edges = [];

    data.forEach(node => {
      if (node.connections && Array.isArray(node.connections)) {
        node.connections.forEach(target => {
          edges.push({
            data: {
              source: node.url,
              target: target
            }
          });
        });
      }
    });

    console.log("Nodes:", nodes.length);
    console.log("Edges:", edges.length);

    // --- INIT CYTOSCAPE ---
    const cy = cytoscape({
      container: document.getElementById('cy'),

      elements: [
        ...nodes,
        ...edges
      ],

      style: [
        {
          selector: 'node',
          style: {
            'label': 'data(label)',
            'background-color': 'red',
            'font-size': '10px',
            'color': 'black',
            'text-valign': 'top',
            'text-halign': 'center'
          }
        },
        {
          selector: 'edge',
          style: {
            'width': 1,
            'line-color': '#ccc'
          }
        }
      ],

      layout: {
        name: 'grid',   // FORCE visible layout
        fit: true
      }
    });

    // --- CLICK INTERACTION ---
    cy.on('tap', 'node', function(evt) {
      const node = evt.target.data();

      document.getElementById("info").innerHTML = `
        <strong>${node.label}</strong><br>
        <a href="${node.url}" target="_blank">Visit site</a>
      `;
    });

    document.getElementById("info").innerText = "Click a node to explore";

  })
  .catch(error => {
    console.error("ERROR LOADING JSON:", error);

    document.getElementById("info").innerHTML = `
      <strong>Error loading network.</strong><br>
      Open console to debug.
    `;
  });
</script>

</body>
</html>
