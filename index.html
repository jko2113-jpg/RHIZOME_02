<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rhizomatic Website Network</title>

  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Public Sans', sans-serif;
      background: #3a3a3a;
    }

    #cy {
      width: 100vw;
      height: 100vh;
    }

    #info {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(255,255,255,0.95);
      padding: 15px;
    }

    #preview {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 300px;
      height: 200px;
      display: none;
      background: #000;
    }

    #preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #stream {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 220px;
      height: 150px;
      background: #000;
      border: 1px solid #555;
      overflow: hidden;
    }

    #stream img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

<audio id="bg-music" loop>
  <source src="Overture.mp3" type="audio/mpeg">
</audio>

<div id="cy"></div>
<div id="stream"></div>
<div id="preview"></div>
<div id="info">Click anywhere to begin</div>

<script>
const audio = document.getElementById("bg-music");
let musicStarted = false;

function startMusic() {
  if (!musicStarted) {
    audio.volume = 0.5;
    audio.play().then(() => {
      musicStarted = true;
    }).catch(() => {});
  }
}

document.body.addEventListener("click", startMusic, { once: true });

// --- IMAGE STREAM (keep your list) ---
const streamImages = [/* keep your existing list */];

function startImageStream() {
  const container = document.getElementById("stream");
  const img = document.createElement("img");
  container.appendChild(img);

  function nextImage() {
    const i = Math.floor(Math.random() * streamImages.length);
    img.src = encodeURI(streamImages[i]);
  }

  img.onerror = () => nextImage();
  nextImage();
  setInterval(nextImage, 250);
}

// --- LOAD NETWORK ---
fetch("network.json")
  .then(res => res.json())
  .then(data => {

    const nodes = data.map(n => ({
      data: { id: n.url, label: n.title || n.url, url: n.url }
    }));

    const edges = [];
    data.forEach(n => {
      (n.connections || []).forEach(t => {
        edges.push({ data: { source: n.url, target: t } });
      });
    });

    const cy = cytoscape({
      container: document.getElementById('cy'),
      elements: [...nodes, ...edges],

      style: [
        {
          selector: 'node',
          style: {
            // ✅ ALWAYS VISIBLE LABELS
            'label': 'data(label)',

            'shape': 'ellipse',
            'width': 22,
            'height': 22,

            'background-fill': 'radial-gradient',
            'background-gradient-stop-colors': '#ffffff #bbbbbb #666666 #222222',
            'background-gradient-stop-positions': '0% 25% 60% 100%',

            'border-width': 1,
            'border-color': '#888',

            // 🔥 LABEL IMPROVEMENTS
            'font-size': '9px',
            'color': '#ffffff',
            'font-family': 'Public Sans',
            'font-weight': 300,

            'text-valign': 'top',
            'text-margin-y': -6,

            // 🔥 READABILITY (KEY FIX)
            'text-background-color': '#3a3a3a',
            'text-background-opacity': 0.6,
            'text-background-padding': '2px',
            'text-background-shape': 'roundrectangle'
          }
        },
        {
          selector: 'edge',
          style: {
            'width': 1,
            'line-color': '#ffffff',
            'opacity': 0.3
          }
        }
      ],

      layout: {
        name: 'cose',
        animate: true,
        animationDuration: 1500,

        // 🔥 SPACING BOOST
        nodeRepulsion: 1400000,
        idealEdgeLength: 200,
        edgeElasticity: 0.2,
        gravity: 0.3,

        padding: 100
      }
    });

    cy.on('tap', () => startMusic());

    cy.on('tap', 'node', evt => {
      const node = evt.target.data();

      document.getElementById("info").innerHTML = `
        <strong>${node.label}</strong><br>
        <a href="${node.url}" target="_blank">Visit site</a>
      `;

      const preview = document.getElementById("preview");

      preview.innerHTML = `<img id="preview-img">`;
      const img = document.getElementById("preview-img");

      img.src = `https://www.google.com/s2/favicons?sz=128&domain_url=${node.url}`;

      setTimeout(() => {
        img.src = `https://image.thum.io/get/width/800/${node.url}`;
      }, 300);

      setTimeout(() => {
        img.src = `https://api.microlink.io/?url=${encodeURIComponent(node.url)}&screenshot=true&meta=false&embed=screenshot.url`;
      }, 1200);

      preview.style.display = "block";
    });

    cy.on('dbltap', 'node', evt => {
      window.open(evt.target.data().url, "_blank");
    });

    startImageStream();
  });
</script>

</body>
</html>
