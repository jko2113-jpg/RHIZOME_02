<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rhizomatic Website Network</title>

  <!-- Public Sans -->
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Cytoscape -->
  <script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Public Sans', sans-serif;
      background: #3a3a3a;
    }

    #cy {
      width: 100vw;
      height: 100vh;
    }

    #info {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(255,255,255,0.95);
      padding: 15px;
      font-size: 14px;
    }

    #preview {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 240px;
      height: 150px;
      display: none;
      border: 1px solid #ccc;
      background: #eee;
    }

    #preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 🔥 NEW STREAM WINDOW */
    #stream {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 220px;
      height: 150px;
      background: #000;
      border: 1px solid #555;
      overflow: hidden;
      z-index: 10;
    }

    #stream img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    a {
      color: black;
    }
  </style>
</head>
<body>

<!-- 🔊 AUDIO -->
<audio id="bg-music" loop>
  <source src="Overture.mp3" type="audio/mpeg">
</audio>

<div id="cy"></div>
<div id="stream"></div>
<div id="preview"></div>
<div id="info">Click anywhere to begin</div>

<script>
const audio = document.getElementById("bg-music");
let musicStarted = false;

// --- START MUSIC ---
function startMusic() {
  if (!musicStarted) {
    audio.volume = 0.5;

    const playPromise = audio.play();

    if (playPromise !== undefined) {
      playPromise
        .then(() => {
          musicStarted = true;
          console.log("Music started");
        })
        .catch(err => {
          console.log("Autoplay blocked:", err);
        });
    }
  }
}

// fallback click
document.body.addEventListener("click", startMusic, { once: true });

// --- IMAGE STREAM (EDIT FILENAMES HERE) ---
const streamImages = [
  "images/img1.jpg",
  "images/img2.jpg",
  "images/img3.jpg",
  "images/img4.jpg"
];

function startImageStream() {
  const container = document.getElementById("stream");
  const img = document.createElement("img");
  container.appendChild(img);

  function nextImage() {
    const randomIndex = Math.floor(Math.random() * streamImages.length);
    img.src = streamImages[randomIndex];
  }

  nextImage();
  setInterval(nextImage, 250); // speed
}

// --- LOAD DATA ---
fetch("network.json")
  .then(res => res.json())
  .then(data => {

    function getPreviewImage(url) {
      return `https://api.microlink.io/?url=${encodeURIComponent(url)}&screenshot=true&meta=false&embed=screenshot.url`;
    }

    const nodes = data.map(n => ({
      data: {
        id: n.url,
        label: n.title || n.url,
        url: n.url
      }
    }));

    const edges = [];
    data.forEach(n => {
      (n.connections || []).forEach(t => {
        edges.push({
          data: { source: n.url, target: t }
        });
      });
    });

    const cy = cytoscape({
      container: document.getElementById('cy'),
      elements: [...nodes, ...edges],

      style: [
        {
          selector: 'node',
          style: {
            'label': '',
            'shape': 'ellipse',
            'width': 22,
            'height': 22,

            // chrome effect
            'background-fill': 'radial-gradient',
            'background-gradient-stop-colors': '#ffffff #bbbbbb #666666 #222222',
            'background-gradient-stop-positions': '0% 25% 60% 100%',

            'border-width': 1,
            'border-color': '#888',

            'font-family': 'Public Sans',
            'font-weight': 300,
            'color': '#ffffff'
          }
        },
        {
          selector: 'node:hover',
          style: {
            'label': 'data(label)',
            'width': 26,
            'height': 26
          }
        },
        {
          selector: 'edge',
          style: {
            'width': 1,
            'line-color': '#ffffff',
            'opacity': 0.3
          }
        }
      ],

      layout: {
        name: 'cose',
        animate: true,
        fit: true,
        padding: 30,
        nodeRepulsion: 800000,
        idealEdgeLength: 100
      }
    });

    // allow graph interaction to start music
    cy.on('tap', () => {
      startMusic();
    });

    // node click
    cy.on('tap', 'node', evt => {
      const node = evt.target.data();

      document.getElementById("info").innerHTML = `
        <strong>${node.label}</strong><br>
        <a href="${node.url}" target="_blank">Visit site</a><br><br>
        <em>Double-click node to open</em>
      `;

      const preview = document.getElementById("preview");

      preview.innerHTML = `
        <img src="${getPreviewImage(node.url)}"
             onerror="this.src='https://www.google.com/s2/favicons?sz=128&domain_url=${node.url}'">
      `;

      preview.style.display = "block";
    });

    // double click
    cy.on('dbltap', 'node', evt => {
      window.open(evt.target.data().url, "_blank");
    });

    // start stream AFTER everything loads
    startImageStream();

  })
  .catch(error => {
    console.error(error);
    document.getElementById("info").innerHTML = "Error loading network";
  });
</script>

</body>
</html>
