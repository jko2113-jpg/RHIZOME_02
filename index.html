<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rhizomatic Website Network</title>

  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Public Sans', sans-serif;
      background: #3a3a3a;
    }

    #cy {
      width: 100vw;
      height: 100vh;
    }

    #info {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(255,255,255,0.95);
      padding: 15px;
    }

    #preview {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 300px;
      height: 200px;
      display: none;
      background: #000;
    }

    #preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #stream {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 220px;
      height: 150px;
      background: #000;
      border: 1px solid #555;
      overflow: hidden;
    }

    #stream img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

<audio id="bg-music" loop>
  <source src="Overture.mp3" type="audio/mpeg">
</audio>

<div id="cy"></div>
<div id="stream"></div>
<div id="preview"></div>
<div id="info">Click anywhere to begin</div>

<script>
const audio = document.getElementById("bg-music");
let musicStarted = false;

function startMusic() {
  if (!musicStarted) {
    audio.volume = 0.5;
    audio.play().then(() => {
      musicStarted = true;
    }).catch(() => {});
  }
}

document.body.addEventListener("click", startMusic, { once: true });

// --- CLEAN IMAGE LIST (only reliable files) ---
const streamImages = [
  "images/516241.jpg",
  "images/5bd259f159aea7da80129db766bf2df1.jpg",
  "images/S63VOG7rVZ.jpg",
  "images/cc659441577a0e2014480954d2a9e207.jpg",
  "images/dse_2015072902093254915340.jpg",
  "images/f2525090cb65445289ca3a39e6c15cbe.jpg",
  "images/fold_up_model.jpg",
  "images/img_4004.jpg",
  "images/levittown-ny-sketch.jpg",
  "images/odawara-municipal-sports-complex-proposal.jpg",
  "images/unnamed.jpg",
  "images/why-tutankhamuns-tomb.jpg",
  "images/willemen-infra-mockup-1300x317.jpg",
  "images/251127_karelmarten_smallprint.jpg",
  "images/349_MO_1102_008_diagram_studio.jpg",
  "images/349_MO_1102_009_diagram_studio.jpg",
  "images/3D-Model-Raycloud.png",
  "images/3dcd6bad-88e8-42e0-a86b-f6a1447fbac3_1440x901.jpg"
];

function startImageStream() {
  const container = document.getElementById("stream");
  const img = document.createElement("img");
  container.appendChild(img);

  function nextImage() {
    const i = Math.floor(Math.random() * streamImages.length);
    img.src = streamImages[i];
  }

  img.onerror = () => {
    console.log("Image failed:", img.src);
    nextImage();
  };

  nextImage();
  setInterval(nextImage, 900);
}

// --- LOAD NETWORK ---
fetch("network.json")
  .then(res => res.json())
  .then(data => {

    const nodes = data.map(n => ({
      data: { id: n.url, label: n.title || n.url, url: n.url }
    }));

    const edges = [];
    data.forEach(n => {
      (n.connections || []).forEach(t => {
        edges.push({ data: { source: n.url, target: t } });
      });
    });

    const cy = cytoscape({
      container: document.getElementById('cy'),
      elements: [...nodes, ...edges],

      style: [
        {
          selector: 'node',
          style: {
            'label': 'data(label)',
            'shape': 'ellipse',
            'width': 22,
            'height': 22,
            'background-fill': 'radial-gradient',
            'background-gradient-stop-colors': '#ffffff #bbbbbb #666666 #222222',
            'background-gradient-stop-positions': '0% 25% 60% 100%',
            'border-width': 1,
            'border-color': '#888',

            'font-size': '9px',
            'color': '#ffffff',
            'font-family': 'Public Sans',
            'font-weight': 300,

            'text-valign': 'top',
            'text-margin-y': -6,
            'text-background-color': '#3a3a3a',
            'text-background-opacity': 0.6,
            'text-background-padding': '2px'
          }
        },
        {
          selector: 'edge',
          style: {
            'width': 1,
            'line-color': '#ffffff',
            'opacity': 0.3
          }
        }
      ],

      layout: {
        name: 'cose',
        animate: true,
        animationDuration: 1500,
        nodeRepulsion: 1400000,
        idealEdgeLength: 200,
        padding: 100
      }
    });

    cy.on('tap', () => startMusic());

    // --- SIMPLIFIED + RELIABLE PREVIEW ---
    cy.on('tap', 'node', evt => {
      const node = evt.target.data();

      document.getElementById("info").innerHTML = `
        <strong>${node.label}</strong><br>
        <a href="${node.url}" target="_blank">Visit site</a>
      `;

      const preview = document.getElementById("preview");
      preview.innerHTML = `<img id="preview-img">`;

      const img = document.getElementById("preview-img");

      // fast + reliable preview
      img.src = `https://image.thum.io/get/width/800/${node.url}`;

      img.onerror = () => {
        img.src = `https://www.google.com/s2/favicons?sz=128&domain_url=${node.url}`;
      };

      preview.style.display = "block";
    });

    cy.on('dbltap', 'node', evt => {
      window.open(evt.target.data().url, "_blank");
    });

    setTimeout(startImageStream, 1000);
  });
</script>

</body>
</html>
