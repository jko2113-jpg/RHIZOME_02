<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rhizomatic Website Network</title>

  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Public Sans', sans-serif;
      background: #3a3a3a;
    }

    #cy {
      width: 100vw;
      height: 100vh;
    }

    #info {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(255,255,255,0.95);
      padding: 15px;
    }

    #preview {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 240px;
      height: 150px;
      display: none;
      border: 1px solid #ccc;
      background: #eee;
    }

    #preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #stream {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 220px;
      height: 150px;
      background: #000;
      border: 1px solid #555;
      overflow: hidden;
      z-index: 10;
    }

    #stream img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

<audio id="bg-music" loop>
  <source src="Overture.mp3" type="audio/mpeg">
</audio>

<div id="cy"></div>
<div id="stream"></div>
<div id="preview"></div>
<div id="info">Click anywhere to begin</div>

<script>
const audio = document.getElementById("bg-music");
let musicStarted = false;

function startMusic() {
  if (!musicStarted) {
    audio.volume = 0.5;
    audio.play().then(() => {
      musicStarted = true;
    }).catch(() => {});
  }
}

document.body.addEventListener("click", startMusic, { once: true });

// ✅ IMAGE LIST
const streamImages = [
  "images/516241.jpg",
  "images/5bd259f159aea7da80129db766bf2df1.jpg",
  "images/Carter_i_G_11 (1).jpg",
  "images/FBA_Yoko_01_model_elev_and_plan.width-1200-1024x649.jpg",
  "images/FBA_Yokohama_undated_032-border.width-2000-e1601992539421-1024.jpg",
  "images/FBA_Yokohama_undated_035-border.width-2000-e1601992515413-1024.jpg",
  "images/Left-Centro-Direzionale-di-Torino-Right-Rossi-City-Hall-in-Scandicci.jpg",
  "images/S63VOG7rVZ.jpg",
  "images/Schermafbeelding-2020-05-13-om-14.24.57.png",
  "images/Screenshot 2026-02-16 191959.png",
  "images/Veldwerk-Architecten--Alternative-Histories--2019---Bel-Sozietat-fur-Architektur.jpg",
  "images/ah-11-1-8278-g17.jpg",
  "images/binding_beam_volumes_multiple.png",
  "images/cc659441577a0e2014480954d2a9e207.jpg",
  "images/dse_2015072902093254915340.jpg",
  "images/f2525090cb65445289ca3a39e6c15cbe.jpg",
  "images/fold_up_model.jpg",
  "images/img_4004.jpg",
  "images/levittown-ny-sketch.jpg",
  "images/odawara-municipal-sports-complex-proposal.jpg",
  "images/unnamed.jpg",
  "images/why-tutankhamuns-tomb.jpg",
  "images/willemen-infra-mockup-1300x317.jpg",
  "images/251127_karelmarten_smallprint.jpg",
  "images/349_DT_120601_002.tif.jpg",
  "images/349_DT_120601_003.tif.jpg",
  "images/349_DT_120601_004.tif.jpg",
  "images/349_DT_120601_005.tif.jpg",
  "images/349_MO_1102_008_diagram_studio.jpg",
  "images/349_MO_1102_009_diagram_studio.jpg",
  "images/3D-Model-Raycloud.png",
  "images/3dcd6bad-88e8-42e0-a86b-f6a1447fbac3_1440x901.jpg"
];

function startImageStream() {
  const container = document.getElementById("stream");
  const img = document.createElement("img");
  container.appendChild(img);

  function nextImage() {
    const randomIndex = Math.floor(Math.random() * streamImages.length);
    const safePath = encodeURI(streamImages[randomIndex]);
    img.src = safePath;
  }

  // skip broken images automatically
  img.onerror = () => {
    nextImage();
  };

  nextImage();
  setInterval(nextImage, 250);
}

fetch("network.json")
  .then(res => res.json())
  .then(data => {

    function getPreviewImage(url) {
      return `https://api.microlink.io/?url=${encodeURIComponent(url)}&screenshot=true&embed=screenshot.url`;
    }

    const nodes = data.map(n => ({
      data: { id: n.url, label: n.title || n.url, url: n.url }
    }));

    const edges = [];
    data.forEach(n => {
      (n.connections || []).forEach(t => {
        edges.push({ data: { source: n.url, target: t } });
      });
    });

    const cy = cytoscape({
      container: document.getElementById('cy'),
      elements: [...nodes, ...edges],

      style: [
        {
          selector: 'node',
          style: {
            'label': '',
            'shape': 'ellipse',
            'width': 22,
            'height': 22,
            'background-fill': 'radial-gradient',
            'background-gradient-stop-colors': '#ffffff #bbbbbb #666666 #222222',
            'background-gradient-stop-positions': '0% 25% 60% 100%',
            'border-width': 1,
            'border-color': '#888',
            'font-family': 'Public Sans',
            'font-weight': 300,
            'color': '#ffffff'
          }
        },
        {
          selector: 'node:hover',
          style: {
            'label': 'data(label)',
            'width': 26,
            'height': 26
          }
        },
        {
          selector: 'edge',
          style: {
            'width': 1,
            'line-color': '#ffffff',
            'opacity': 0.3
          }
        }
      ],

      layout: { name: 'cose' }
    });

    cy.on('tap', () => startMusic());

    cy.on('tap', 'node', evt => {
      const node = evt.target.data();

      document.getElementById("info").innerHTML = `
        <strong>${node.label}</strong><br>
        <a href="${node.url}" target="_blank">Visit site</a>
      `;

      const preview = document.getElementById("preview");

      preview.innerHTML = `
        <img src="${getPreviewImage(node.url)}"
             onerror="this.src='https://www.google.com/s2/favicons?sz=128&domain_url=${node.url}'">
      `;

      preview.style.display = "block";
    });

    cy.on('dbltap', 'node', evt => {
      window.open(evt.target.data().url, "_blank");
    });

    startImageStream();
  });
</script>

</body>
</html>
