<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rhizomatic Website Network</title>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@100;300;400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Public Sans', sans-serif;
      font-weight: 100;
      background: #1a1a1a;
    }

    #cy {
      width: 100vw;
      height: 100vh;
    }

    /* ── Image stream ─────────────────────────── */
    #stream {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 200px;
      height: 130px;
      background: #000;
      border: 1px solid #3a3a3a;
      overflow: hidden;
      z-index: 10;
    }

    #stream img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── Legend ───────────────────────────────── */
    #legend {
      position: fixed;
      top: 170px;
      left: 20px;
      width: 160px;
      z-index: 10;
    }

    #legend-header {
      padding: 0 0 10px 0;
      color: #555;
      font-size: 11px;
      font-style: italic;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }

    #legend-header:hover { color: #888; }

    #legend-items { padding: 0; }

    .legend-item {
      display: block;
      padding: 3px 0;
      cursor: pointer;
      color: #777;
      transition: color 0.15s;
      user-select: none;
    }

    .legend-item:hover { color: #ddd; }
    .legend-item.active { color: #fff; }
    .legend-item.dimmed { color: #252525; }

    .legend-name { font-size: 12px; }
    .legend-count { display: none; }

    /* ── Category fan lines ───────────────────── */
    #cat-lines {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 9;
    }

    /* ── Coordinate overlay ───────────────────── */
    #coord-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 8;
    }

    /* ── Info panel ───────────────────────────── */
    #info {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10, 10, 10, 0.96);
      border-top: 1px solid #2a2a2a;
      padding: 12px 20px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 56px;
    }

    #info-text { flex: 1; }

    #info-title {
      font-size: 13px;
      font-weight: 600;
      color: #e0e0e0;
      margin-bottom: 5px;
    }

    #info-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    #info-category {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      letter-spacing: 0.08em;
    }

    .tag {
      font-size: 10px;
      color: #666;
      background: rgba(255,255,255,0.05);
      padding: 2px 6px;
    }

    #info-description {
      color: #777;
      font-size: 11px;
      margin-top: 4px;
      font-weight: 300;
    }

    #info-link {
      color: #aaa;
      text-decoration: none;
      font-size: 11px;
      white-space: nowrap;
      padding: 6px 14px;
      border: 1px solid #333;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }

    #info-link:hover { color: #fff; border-color: #777; }

    /* ── Preview thumbnail ────────────────────── */
    #preview {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 260px;
      height: 165px;
      display: none;
      background: #111;
      border: 1px solid #3a3a3a;
      z-index: 10;
      overflow: hidden;
    }

    #preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── Reset filter button ──────────────────── */
    #reset-filter {
      display: none;
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(12, 12, 12, 0.9);
      border: 1px solid #555;
      color: #aaa;
      padding: 6px 18px;
      font-family: 'Public Sans', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      cursor: pointer;
      z-index: 20;
    }

    #reset-filter:hover { border-color: #aaa; color: #fff; }
  </style>
</head>
<body>

<audio id="bg-music" loop>
  <source src="Overture.mp3" type="audio/mpeg">
</audio>

<div id="cy"></div>
<div id="stream"></div>

<svg id="coord-overlay"></svg>
<svg id="cat-lines"></svg>

<div id="legend">
  <div id="legend-header">view by category <span id="legend-toggle">−</span></div>
  <div id="legend-items"></div>
</div>

<div id="preview"></div>
<button id="reset-filter">SHOW ALL</button>

<div id="info">
  <div id="info-text">
    <div id="info-title">Click a node to explore</div>
  </div>
</div>

<script>
// ── Category colors ────────────────────────────────────────────────────────────
const CATEGORY_COLORS = {
  'Archive':     '#c3a55c',
  'Artifact':    '#c2975a',
  'Blog':        '#f2ff26',
  'Book':        '#ffbf99',
  'Bookstore':   '#f2ad78',
  'Data':        '#ffff00',
  'Entourage':   '#f59994',
  'Film':        '#ff7340',
  'Guide':       '#ffb852',
  'Institution': '#c0b490',
  'Mapping':     '#ffe600',
  'Materials':   '#bcd382',
  'Practice':    '#ffab00',
  'Publication': '#fa9442',
  'Reference':   '#d99e73',
  'Software':    '#c4bf33',
  'Sound':       '#ff8c00',
  'Tool':        '#e0b81f',
};

function catColor(cat) {
  return CATEGORY_COLORS[cat] || '#888888';
}

// ── Music ──────────────────────────────────────────────────────────────────────
const audio = document.getElementById('bg-music');
let musicStarted = false;

function startMusic() {
  if (!musicStarted) {
    audio.volume = 0.5;
    audio.play().then(() => { musicStarted = true; }).catch(() => {});
  }
}
document.body.addEventListener('click', startMusic, { once: true });

// ── Image stream ───────────────────────────────────────────────────────────────
const streamImages = [
  "images/516241.jpg",
  "images/5bd259f159aea7da80129db766bf2df1.jpg",
  "images/S63VOG7rVZ.jpg",
  "images/cc659441577a0e2014480954d2a9e207.jpg",
  "images/dse_2015072902093254915340.jpg",
  "images/f2525090cb65445289ca3a39e6c15cbe.jpg",
  "images/fold_up_model.jpg",
  "images/img_4004.jpg",
  "images/levittown-ny-sketch.jpg",
  "images/odawara-municipal-sports-complex-proposal.jpg",
  "images/unnamed.jpg",
  "images/why-tutankhamuns-tomb.jpg",
  "images/willemen-infra-mockup-1300x317.jpg",
  "images/251127_karelmarten_smallprint.jpg",
  "images/349_MO_1102_008_diagram_studio.jpg",
  "images/349_MO_1102_009_diagram_studio.jpg",
  "images/3D-Model-Raycloud.png",
  "images/3dcd6bad-88e8-42e0-a86b-f6a1447fbac3_1440x901.jpg"
];

function startImageStream() {
  const container = document.getElementById('stream');
  const img = document.createElement('img');
  container.appendChild(img);
  function nextImage() {
    img.src = streamImages[Math.floor(Math.random() * streamImages.length)];
  }
  img.onerror = () => nextImage();
  nextImage();
  setInterval(nextImage, 900);
}

// ── Load network ───────────────────────────────────────────────────────────────
fetch('network.json')
  .then(res => res.json())
  .then(data => {

    const nodes = data.map(n => ({
      data: {
        id:          n.url,
        label:       n.title || n.url,
        url:         n.url,
        category:    n.category || 'Reference',
        tags:        n.tags || [],
        description: n.description || '',
      }
    }));

    const nodeIds = new Set(nodes.map(n => n.data.id));
    const edgeSet = new Set();
    const edges = [];
    data.forEach(n => {
      (n.connections || []).forEach(t => {
        if (!nodeIds.has(t)) return; // skip edges to nonexistent nodes
        const key = [n.url, t].sort().join('|||');
        if (!edgeSet.has(key)) {
          edgeSet.add(key);
          edges.push({ data: { source: n.url, target: t } });
        }
      });
    });

    // Per-category color selectors
    const catStyles = Object.entries(CATEGORY_COLORS).map(([cat, color]) => ({
      selector: `node[category = "${cat}"]`,
      style: { 'background-color': color, 'border-color': color }
    }));

    const cy = cytoscape({
      container: document.getElementById('cy'),
      elements: [...nodes, ...edges],

      style: [
        {
          selector: 'node',
          style: {
            'label':                    'data(label)',
            'shape':                    'ellipse',
            'width':                    18,
            'height':                   18,
            'background-color':         '#666',
            'border-width':             1.5,
            'border-color':             '#666',
            'border-opacity':           0.8,
            'font-size':                '8px',
            'color':                    '#ffffff',
            'font-family':              'Public Sans',
            'font-weight':              100,
            'text-valign':              'top',
            'text-margin-y':            -5,
            'text-background-color':    '#1a1a1a',
            'text-background-opacity':  0.75,
            'text-background-padding':  '2px',
          }
        },
        ...catStyles,
        {
          selector: 'node.faded',
          style: { 'opacity': 0.07 }
        },
        {
          selector: 'node:selected',
          style: { 'border-width': 3, 'border-color': '#fff', 'width': 24, 'height': 24 }
        },
        {
          selector: 'edge',
          style: { 'width': 1, 'line-color': '#ffffff', 'opacity': 0.18 }
        },
        {
          selector: 'edge.faded',
          style: { 'opacity': 0.02 }
        }
      ],

      layout: {
        name:             'cose',
        animate:          true,
        animationDuration: 1500,
        nodeRepulsion:    1400000,
        idealEdgeLength:  200,
        padding:          100,
      }
    });

    // ── Build legend ─────────────────────────────────────────────────────────
    const counts = {};
    data.forEach(n => {
      const c = n.category || 'Reference';
      counts[c] = (counts[c] || 0) + 1;
    });

    const legendEl = document.getElementById('legend-items');
    let activeFilter = null;

    Object.entries(CATEGORY_COLORS)
      .sort((a, b) => (counts[b[0]] || 0) - (counts[a[0]] || 0))
      .forEach(([cat, color]) => {
        if (!counts[cat]) return;
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.dataset.cat = cat;
        item.innerHTML = `
          <span class="legend-name">${cat}</span>
          <span class="legend-count">${counts[cat]}</span>
        `;
        item.addEventListener('click', () => filterByCategory(cat, item));
        legendEl.appendChild(item);
      });

    // Legend collapse
    document.getElementById('legend-header').addEventListener('click', () => {
      const items = document.getElementById('legend-items');
      const toggle = document.getElementById('legend-toggle');
      const collapsed = items.style.display === 'none';
      items.style.display = collapsed ? '' : 'none';
      toggle.textContent = collapsed ? '−' : '+';
    });

    // ── Category fan lines ────────────────────────────────────────────────────
    function drawCategoryLines(cat) {
      const svg = document.getElementById('cat-lines');
      svg.innerHTML = '';
      const item = document.querySelector(`.legend-item[data-cat="${cat}"]`);
      if (!item) return;
      const rect = item.getBoundingClientRect();
      const x1 = rect.right + 6;
      const y1 = rect.top + rect.height / 2;
      cy.nodes().forEach(n => {
        if (n.data('category') !== cat) return;
        const pos = n.renderedPosition();
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1);
        line.setAttribute('y1', y1);
        line.setAttribute('x2', pos.x);
        line.setAttribute('y2', pos.y);
        line.setAttribute('stroke', '#cc3333');
        line.setAttribute('stroke-width', '0.75');
        line.setAttribute('opacity', '0.65');
        svg.appendChild(line);
      });
    }

    function clearCategoryLines() {
      document.getElementById('cat-lines').innerHTML = '';
    }

    // ── Category filter ───────────────────────────────────────────────────────
    function filterByCategory(cat) {
      if (activeFilter === cat) { resetFilter(); return; }
      activeFilter = cat;

      cy.nodes().forEach(n => {
        n.data('category') === cat ? n.removeClass('faded') : n.addClass('faded');
      });
      cy.edges().forEach(e => {
        const connected = e.source().data('category') === cat || e.target().data('category') === cat;
        connected ? e.removeClass('faded') : e.addClass('faded');
      });

      document.querySelectorAll('.legend-item').forEach(el => {
        const match = el.dataset.cat === cat;
        el.classList.toggle('active', match);
        el.classList.toggle('dimmed', !match);
      });

      drawCategoryLines(cat);
      document.getElementById('reset-filter').style.display = 'block';
    }

    function resetFilter() {
      activeFilter = null;
      cy.nodes().removeClass('faded');
      cy.edges().removeClass('faded');
      document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('active', 'dimmed'));
      clearCategoryLines();
      document.getElementById('reset-filter').style.display = 'none';
    }

    document.getElementById('reset-filter').addEventListener('click', resetFilter);

    cy.on('viewport', () => { if (activeFilter) drawCategoryLines(activeFilter); });

    // ── Node interaction ──────────────────────────────────────────────────────
    cy.on('tap', () => startMusic());

    cy.on('tap', 'node', evt => {
      const d = evt.target.data();
      const color = catColor(d.category);
      const tagsHtml = (d.tags || []).map(t => `<span class="tag">${t}</span>`).join('');

      document.getElementById('info-text').innerHTML = `
        <div id="info-title">${d.label}</div>
        <div id="info-meta">
          <span id="info-category" style="background:${color}22;color:${color}">${d.category}</span>
          ${tagsHtml}
        </div>
        ${d.description ? `<div id="info-description">${d.description}</div>` : ''}
      `;

      const info = document.getElementById('info');
      const existing = info.querySelector('#info-link');
      if (existing) existing.remove();
      const link = document.createElement('a');
      link.id = 'info-link';
      link.href = d.url;
      link.target = '_blank';
      link.textContent = 'VISIT →';
      info.appendChild(link);

      const preview = document.getElementById('preview');
      preview.innerHTML = `<img id="preview-img">`;
      const img = document.getElementById('preview-img');
      img.src = `https://image.thum.io/get/width/800/${d.url}`;
      img.onerror = () => {
        img.src = `https://www.google.com/s2/favicons?sz=128&domain_url=${d.url}`;
      };
      preview.style.display = 'block';
    });

    cy.on('dbltap', 'node', evt => window.open(evt.target.data().url, '_blank'));

    // ── Coordinate overlay ────────────────────────────────────────────────────
    const coordSvg = document.getElementById('coord-overlay');
    const coordMap = new Map();

    function positionCoordElement(n) {
      const el = coordMap.get(n.id());
      if (!el) return;
      const rp  = n.renderedPosition();
      const gp  = n.position();
      const ox  = rp.x;
      const oy  = rp.y + 14;
      const axLen = 7;
      el.xLine.setAttribute('x1', ox);           el.xLine.setAttribute('y1', oy);
      el.xLine.setAttribute('x2', ox + axLen);   el.xLine.setAttribute('y2', oy);
      el.yLine.setAttribute('x1', ox);           el.yLine.setAttribute('y1', oy);
      el.yLine.setAttribute('x2', ox);           el.yLine.setAttribute('y2', oy - axLen);
      el.txt.setAttribute('x', ox + axLen + 2);
      el.txt.setAttribute('y', oy + 3);
      el.txt.textContent = `${Math.round(gp.x)}, ${Math.round(gp.y)}`;
    }

    function createCoordElements() {
      coordSvg.innerHTML = '';
      coordMap.clear();
      cy.nodes().forEach(n => {
        const g     = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        const xLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        const yLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        const txt   = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        for (const ln of [xLine, yLine]) {
          ln.setAttribute('stroke', '#555');
          ln.setAttribute('stroke-width', '0.6');
        }
        txt.setAttribute('font-size', '7');
        txt.setAttribute('fill', '#555');
        txt.setAttribute('font-family', 'Public Sans');
        txt.setAttribute('font-weight', '100');
        g.append(xLine, yLine, txt);
        coordSvg.appendChild(g);
        coordMap.set(n.id(), { xLine, yLine, txt });
        positionCoordElement(n);
      });
    }

    cy.one('layoutstop', createCoordElements);
    cy.on('drag', 'node', evt => positionCoordElement(evt.target));
    cy.on('viewport', () => cy.nodes().forEach(n => positionCoordElement(n)));

    setTimeout(startImageStream, 1000);
  });
</script>

</body>
</html>
