<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rhizomatic Website Network</title>

  <script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #cy {
      width: 100vw;
      height: 100vh;
      display: block;
      background: #ffffff;
    }

    #info {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      max-height: 30%;
      overflow-y: auto;
      background: rgba(255,255,255,0.95);
      border-top: 1px solid #ccc;
      padding: 15px;
      font-size: 14px;
    }

    a {
      color: blue;
    }
  </style>
</head>
<body>

<div id="cy"></div>
<div id="info">Loading network...</div>

<script>
fetch("network.json")
  .then(response => response.json())
  .then(data => {

    if (!data || !Array.isArray(data)) {
      throw new Error("Invalid JSON format");
    }

    // --- CREATE NODES ---
    const nodes = data.map(node => ({
      data: {
        id: node.url,
        label: node.title || node.url,
        url: node.url
      }
    }));

    // --- CREATE EDGES ---
    const edges = [];

    data.forEach(node => {
      if (node.connections && Array.isArray(node.connections)) {
        node.connections.forEach(target => {
          edges.push({
            data: {
              source: node.url,
              target: target
            }
          });
        });
      }
    });

    // --- INIT CYTOSCAPE ---
    const cy = cytoscape({
      container: document.getElementById('cy'),

      elements: [...nodes, ...edges],

      style: [
        {
          selector: 'node',
          style: {
            'label': 'data(label)',
            'background-color': 'red',
            'font-size': '10px',
            'color': 'black',
            'text-valign': 'top',
            'text-halign': 'center'
          }
        },
        {
          selector: 'edge',
          style: {
            'width': 1,
            'line-color': '#ccc'
          }
        }
      ],

      layout: {
        name: 'grid',
        fit: true
      }
    });

    // --- SINGLE + DOUBLE CLICK LOGIC ---
    let tappedBefore;
    let tappedTimeout;

    cy.on('tap', 'node', function(evt) {
      const node = evt.target.data();

      if (tappedTimeout && tappedBefore === node.id) {
        // DOUBLE CLICK → open link
        clearTimeout(tappedTimeout);
        tappedTimeout = null;
        window.open(node.url, "_blank");

      } else {
        // SINGLE CLICK → wait briefly
        tappedBefore = node.id;

        tappedTimeout = setTimeout(() => {
          document.getElementById("info").innerHTML = `
            <strong>${node.label}</strong><br>
            <a href="${node.url}" target="_blank">Visit site</a>
          `;
          tappedTimeout = null;
        }, 250);
      }
    });

    document.getElementById("info").innerText = "Click a node to explore";

  })
  .catch(error => {
    console.error("Error loading network:", error);
    document.getElementById("info").innerHTML = `
      <strong>Error loading network.json</strong><br>
      Check console for details.
    `;
  });
</script>

</body>
</html>
