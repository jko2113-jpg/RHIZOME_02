<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rhizomatic Website Network</title>

  <script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* Background layer */
    #bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background-size: cover;
      background-position: center;
      opacity: 0.2;
      transition: background-image 1.5s ease-in-out;
      filter: blur(4px);
    }

    #cy {
      width: 100vw;
      height: 100vh;
      display: block;
    }

    #info {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      max-height: 30%;
      overflow-y: auto;
      background: rgba(255,255,255,0.95);
      border-top: 1px solid #ccc;
      padding: 15px;
      font-size: 14px;
    }

    #preview {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 240px;
      height: 150px;
      background: #eee;
      border: 1px solid #ccc;
      overflow: hidden;
      display: none;
    }

    #preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    a {
      color: blue;
    }
  </style>
</head>
<body>

<div id="bg"></div>
<div id="cy"></div>
<div id="preview"></div>
<div id="info">Loading network...</div>

<script>
fetch("network.json")
  .then(response => response.json())
  .then(data => {

    if (!data || !Array.isArray(data)) {
      throw new Error("Invalid JSON format");
    }

    // --- IMAGE FUNCTION (Microlink + fallback) ---
    function getPreviewImage(url) {
      return `https://api.microlink.io/?url=${encodeURIComponent(url)}&screenshot=true&meta=false&embed=screenshot.url`;
    }

    // --- BACKGROUND CYCLING ---
    function startBackgroundCycle(data) {
      const bg = document.getElementById("bg");

      function changeBackground() {
        const randomNode = data[Math.floor(Math.random() * data.length)];
        const imageUrl = getPreviewImage(randomNode.url);
        bg.style.backgroundImage = `url(${imageUrl})`;
      }

      changeBackground();
      setInterval(changeBackground, 6000);
    }

    startBackgroundCycle(data);

    // --- CREATE NODES ---
    const nodes = data.map(node => ({
      data: {
        id: node.url,
        label: node.title || node.url,
        url: node.url
      }
    }));

    // --- CREATE EDGES ---
    const edges = [];

    data.forEach(node => {
      if (node.connections && Array.isArray(node.connections)) {
        node.connections.forEach(target => {
          edges.push({
            data: {
              source: node.url,
              target: target
            }
          });
        });
      }
    });

    // --- INIT CYTOSCAPE ---
    const cy = cytoscape({
      container: document.getElementById('cy'),

      elements: [...nodes, ...edges],

      style: [
        {
          selector: 'node',
          style: {
            'label': 'data(label)',
            'background-color': '#000',
            'font-size': '9px',
            'color': '#000',
            'text-valign': 'top',
            'text-halign': 'center'
          }
        },
        {
          selector: 'edge',
          style: {
            'width': 1,
            'line-color': '#ccc'
          }
        }
      ],

      layout: {
        name: 'cose',
        animate: true,
        fit: true,
        padding: 30,
        nodeRepulsion: 800000,
        idealEdgeLength: 100,
        edgeElasticity: 0.1
      }
    });

    // --- CLICK: INFO + IMAGE ---
    cy.on('tap', 'node', function(evt) {
      const node = evt.target.data();

      document.getElementById("info").innerHTML = `
        <strong>${node.label}</strong><br>
        <a href="${node.url}" target="_blank">Visit site</a><br><br>
        <em>Double-click node to open directly</em>
      `;

      const preview = document.getElementById("preview");

      preview.innerHTML = `
        <img src="${getPreviewImage(node.url)}"
             onerror="this.src='https://www.google.com/s2/favicons?sz=128&domain_url=${node.url}'">
      `;

      preview.style.display = "block";
    });

    // --- DOUBLE CLICK: OPEN SITE ---
    cy.on('dbltap', 'node', function(evt) {
      const node = evt.target.data();
      window.open(node.url, "_blank");
    });

    document.getElementById("info").innerText = "Click a node to explore";

  })
  .catch(error => {
    console.error("Error loading network:", error);

    document.getElementById("info").innerHTML = `
      <strong>Error loading network.json</strong><br>
      Check console for details.
    `;
  });
</script>

</body>
</html>
