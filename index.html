<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rhizomatic Website Network</title>

  <!-- Cytoscape -->
  <script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #cy {
      width: 100vw;
      height: 100vh;
      display: block;
    }

    #info {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      max-height: 30%;
      overflow-y: auto;
      background: rgba(255,255,255,0.95);
      border-top: 1px solid #ccc;
      padding: 15px;
      font-size: 14px;
    }

    a {
      color: blue;
    }
  </style>
</head>
<body>

<div id="cy"></div>
<div id="info">Click a node to explore</div>

<script>
fetch("network.json")
  .then(res => res.json())
  .then(data => {

    // --- CREATE NODES ---
    const nodes = data.map(node => ({
      data: {
        id: node.url,
        label: node.title || node.url,
        url: node.url
      }
    }));

    // --- CREATE EDGES ---
    const edges = [];

    data.forEach(node => {
      if (node.connections) {
        node.connections.forEach(target => {
          edges.push({
            data: {
              source: node.url,
              target: target
            }
          });
        });
      }
    });

    // --- INIT CYTOSCAPE ---
    const cy = cytoscape({
      container: document.getElementById('cy'),

      elements: [
        ...nodes,
        ...edges
      ],

      style: [
        {
          selector: 'node',
          style: {
            'label': 'data(label)',
            'font-size': '8px',
            'background-color': '#000',
            'color': '#000',
            'text-valign': 'top',
            'text-halign': 'center'
          }
        },
        {
          selector: 'edge',
          style: {
            'width': 1,
            'line-color': '#ccc'
          }
        }
      ],

      layout: {
        name: 'cose',
        animate: true,
        fit: true
      }
    });

    // --- CLICK INTERACTION ---
    cy.on('tap', 'node', function(evt) {
      const node = evt.target.data();

      document.getElementById("info").innerHTML = `
        <strong>${node.label}</strong><br>
        <a href="${node.url}" target="_blank">Visit site</a>
      `;
    });

  })
  .catch(error => {
    console.error("Error loading network.json:", error);
    document.getElementById("info").innerText = "Error loading data.";
  });
</script>

</body>
</html>
